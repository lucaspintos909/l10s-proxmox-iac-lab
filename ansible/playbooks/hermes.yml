---
# Playbook: Instalar Hermes Agent en el contenedor LXC
# Uso: ansible-playbook playbooks/hermes.yml

- name: Instalar Hermes Agent (Nous Research)
  hosts: hermes-agent
  gather_facts: true
  become: true

  pre_tasks:
    - name: Actualizar cache de APT
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  roles:
    - hermes_setup
