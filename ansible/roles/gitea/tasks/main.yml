---
# ─── Gitea Role ──────────────────────────────────────────
# Deploys Gitea as a Docker container behind Traefik.

- name: Create Gitea directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/gitea
    - /opt/gitea/data

- name: Create Gitea docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/gitea/docker-compose.yml
    mode: "0644"
  notify: restart gitea

- name: Allow Gitea HTTP port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ gitea_http_port | string }}"
    proto: tcp

- name: Allow Gitea SSH port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ gitea_ssh_port | string }}"
    proto: tcp

- name: Start Gitea
  community.docker.docker_compose_v2:
    project_src: /opt/gitea
    state: present
