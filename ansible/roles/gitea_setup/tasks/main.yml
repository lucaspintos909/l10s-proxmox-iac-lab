---
# 0. Instalar dependencias
- name: Instalar paquetes requeridos (git, tzdata)
  ansible.builtin.apt:
    name:
      - git
      - tzdata
    state: present
# 1. Crear usuario git
- name: Crear grupo {{ gitea_group }}
  ansible.builtin.group:
    name: "{{ gitea_group }}"
    system: true
    state: present

- name: Crear usuario {{ gitea_user }}
  ansible.builtin.user:
    name: "{{ gitea_user }}"
    group: "{{ gitea_group }}"
    home: /home/{{ gitea_user }}
    shell: /bin/bash
    system: true
    create_home: true
    comment: "Git Version Control"
    state: present

# 2. Crear directorios para Gitea
- name: Crear directorios requeridos
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default(gitea_group) }}"
    mode: "{{ item.mode | default('0750') }}"
  loop:
    - { path: "{{ gitea_home }}", owner: "{{ gitea_user }}", mode: "0750" }
    - { path: "{{ gitea_home }}/custom", owner: "{{ gitea_user }}", mode: "0750" }
    - { path: "{{ gitea_home }}/data", owner: "{{ gitea_user }}", mode: "0750" }
    - { path: "{{ gitea_home }}/log", owner: "{{ gitea_user }}", mode: "0750" }
    - { path: "{{ gitea_config_dir }}", owner: "root", mode: "0770" }

# 3. Descargar Gitea
- name: Descargar binario de Gitea ({{ gitea_version }})
  ansible.builtin.get_url:
    url: "https://dl.gitea.com/gitea/{{ gitea_version }}/gitea-{{ gitea_version }}-{{ gitea_arch }}"
    dest: /usr/local/bin/gitea
    mode: '0755'
    owner: root
    group: root
  notify: Restart Gitea

# 4. Configurar el servicio systemd
- name: Generar archivo gitea.service
  ansible.builtin.template:
    src: gitea.service.j2
    dest: /etc/systemd/system/gitea.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart Gitea

- name: Habilitar e iniciar el servicio gitea
  ansible.builtin.systemd:
    name: gitea
    enabled: true
    state: started
    daemon_reload: true
