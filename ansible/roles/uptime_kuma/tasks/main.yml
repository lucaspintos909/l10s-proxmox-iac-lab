---
# ─── Uptime Kuma Role ────────────────────────────────────
# Deploys Uptime Kuma for uptime monitoring.

- name: Create Uptime Kuma directories
  ansible.builtin.file:
    path: /opt/uptime-kuma
    state: directory
    mode: "0755"

- name: Create Uptime Kuma docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/uptime-kuma/docker-compose.yml
    mode: "0644"
  notify: restart uptime-kuma

- name: Allow Uptime Kuma port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ uptime_kuma_port | string }}"
    proto: tcp

- name: Start Uptime Kuma
  community.docker.docker_compose_v2:
    project_src: /opt/uptime-kuma
    state: present
