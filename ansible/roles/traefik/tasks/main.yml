---
# ─── Traefik Role ────────────────────────────────────────
# Deploys Traefik as a Docker container with auto-discovery.

- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/traefik
    - /opt/traefik/config
    - /opt/traefik/certs

- name: Create Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /opt/traefik/traefik.yml
    mode: "0644"
  notify: restart traefik

- name: Create Traefik dynamic config
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: /opt/traefik/config/dynamic.yml
    mode: "0644"
  notify: restart traefik

- name: Create Traefik docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/traefik/docker-compose.yml
    mode: "0644"
  notify: restart traefik

- name: Allow Traefik dashboard port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ traefik_dashboard_port | string }}"
    proto: tcp

- name: Start Traefik
  community.docker.docker_compose_v2:
    project_src: /opt/traefik
    state: present
