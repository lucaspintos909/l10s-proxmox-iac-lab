---
# ─── Portainer Role ──────────────────────────────────────
# Deploys Portainer CE as a Docker container behind Traefik.

- name: Create Portainer directories
  ansible.builtin.file:
    path: /opt/portainer
    state: directory
    mode: "0755"

- name: Create Portainer docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/portainer/docker-compose.yml
    mode: "0644"
  notify: restart portainer

- name: Allow Portainer port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ portainer_port | string }}"
    proto: tcp

- name: Start Portainer
  community.docker.docker_compose_v2:
    project_src: /opt/portainer
    state: present
